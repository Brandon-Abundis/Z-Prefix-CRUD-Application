services:
  db:
    image: postgres
    container_name: pg-docker
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=docker
      - POSTGRES_DB=crud_db
    ports:
      - 5432:5432

  api:
    build: ./server
    command: npm run docker:setup
    ports:
    - 8080:8080
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      - DATABASE_URL=postgres://postgres:docker@db:5432/crud_db

  ui:
    build: ./client
    ports:
      - 5173:5173
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8080
    command: npm run dev
    depends_on:
      - api